<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Reading Buddy" />
  <meta name="theme-color" content="#5b8def" />
  <title>Reading Buddy 📖</title>

  <!-- Installable web app: manifest + home-screen icon -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="icon-192.png" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Screens are rendered here by app.js -->
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>

  <!-- Register the service worker so the app works offline once installed -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {
          /* offline support unavailable (e.g. opened via file://) — app still works */
        });
      });
    }
  </script>
</body>
</html>

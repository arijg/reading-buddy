<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6f9bf2"/>
      <stop offset="1" stop-color="#3f6fd1"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1c3a78" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- full-bleed background; iOS rounds the corners itself -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- open book -->
  <g filter="url(#soft)">
    <!-- left page -->
    <path d="M512 300
             C 430 250, 300 240, 210 268
             L 210 720
             C 300 692, 430 702, 512 752 Z"
          fill="#ffffff"/>
    <!-- right page -->
    <path d="M512 300
             C 594 250, 724 240, 814 268
             L 814 720
             C 724 692, 594 702, 512 752 Z"
          fill="#f3f6ff"/>
    <!-- spine -->
    <path d="M512 300 L 512 752" stroke="#cdd8f2" stroke-width="10" stroke-linecap="round"/>

    <!-- text lines, left -->
    <g stroke="#bcd0f7" stroke-width="14" stroke-linecap="round">
      <path d="M280 360 L 452 372"/>
      <path d="M280 420 L 452 432"/>
      <path d="M280 480 L 452 492"/>
      <path d="M280 540 L 452 552"/>
      <path d="M280 600 L 420 610"/>
    </g>
    <!-- text lines, right -->
    <g stroke="#c7d6f3" stroke-width="14" stroke-linecap="round">
      <path d="M572 372 L 744 360"/>
      <path d="M572 432 L 744 420"/>
      <path d="M572 492 L 744 480"/>
      <path d="M572 552 L 744 540"/>
      <path d="M604 610 L 744 600"/>
    </g>
  </g>

  <!-- cheerful star -->
  <g transform="translate(740 250) rotate(8)">
    <path d="M0 -86 L 24 -26 L 88 -22 L 38 18 L 54 80 L 0 44 L -54 80 L -38 18 L -88 -22 L -24 -26 Z"
          fill="#ffc94b" stroke="#f4b32e" stroke-width="6" stroke-linejoin="round"/>
  </g>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Reading Buddy</title>
  <style>
/* Reading Buddy — big, calm, kid-friendly styling */

:root {
  --bg:        #fef6e4;   /* warm cream */
  --card:      #ffffff;
  --ink:       #2d3142;   /* soft near-black */
  --primary:   #5b8def;   /* friendly blue */
  --primary-d: #3f6fd1;
  --green:     #57cc99;
  --green-d:   #38a3a5;
  --yellow:    #ffc94b;
  --pink:      #ff8fab;
  --purple:    #9b8cff;
  --shadow:    0 6px 0 rgba(0,0,0,0.12);
  --radius:    24px;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0;
  height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: "Comic Sans MS", "Chalkboard SE", "Marker Felt", system-ui, sans-serif;
  -webkit-user-select: none;
  user-select: none;
  overscroll-behavior: none;
}

#app {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
  min-height: 100%;
  display: flex;
  flex-direction: column;
}

/* ---------- Top bar ---------- */
.topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
}
.topbar h1 { font-size: 1.6rem; margin: 0; flex: 1; text-align: center; }
.back-btn {
  border: none;
  background: var(--card);
  color: var(--ink);
  font: inherit;
  font-size: 1.2rem;
  padding: 10px 18px;
  border-radius: 999px;
  box-shadow: var(--shadow);
  cursor: pointer;
}
.back-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,0.12); }
.spacer { width: 64px; }

/* ---------- Home menu ---------- */
.home-title {
  text-align: center;
  font-size: 2.4rem;
  margin: 10px 0 4px;
}
.home-sub { text-align: center; font-size: 1.1rem; opacity: .7; margin-bottom: 24px; }

/* ---------- Star jar (home accomplishments) ---------- */
.stars-banner {
  background: linear-gradient(180deg, #fff6db 0%, #ffe9a8 100%);
  border: 3px solid #ffd45e;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px 20px;
  margin-bottom: 24px;
  text-align: center;
}
.stars-head {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}
.stars-count { font-size: 2.3rem; color: #b5791a; }
.stars-label { font-size: 1.1rem; color: #8a6a2a; }
.stars-row {
  margin-top: 10px;
  font-size: 1.5rem;
  line-height: 1.5;
  word-break: break-word;
}
.stars-more { font-size: 1.1rem; color: #8a6a2a; vertical-align: middle; }
.stars-empty { margin-top: 8px; color: #8a6a2a; font-size: 1.05rem; }
.stars-sub { margin-top: 10px; font-size: 1rem; color: #8a6a2a; opacity: .9; }

/* Collection button on home */
.collection-btn {
  width: 100%;
  border: none;
  font: inherit;
  font-size: 1.3rem;
  color: #fff;
  background: linear-gradient(180deg, #a78bfa 0%, #8b6df0 100%);
  padding: 16px 20px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  cursor: pointer;
  margin-bottom: 24px;
}
.collection-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,0.12); }

/* Collection gallery */
.collection-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.statue-card {
  position: relative;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 14px 10px;
  text-align: center;
}
.statue-card.locked { background: #efeae0; }
.statue-art svg { width: 100%; height: auto; display: block; }
.statue-card.locked .statue-art { filter: grayscale(1) brightness(0.55) opacity(0.5); }
.statue-name { font-size: 1.1rem; margin-top: 8px; }
.statue-req  { font-size: 0.95rem; opacity: .7; margin-top: 2px; }
.lock-badge {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -70%);
  font-size: 2.6rem;
}

/* Statue unlock celebration */
.celebrate-overlay {
  position: fixed;
  inset: 0;
  background: rgba(45, 49, 66, 0.55);
  display: grid;
  place-items: center;
  z-index: 50;
  padding: 20px;
}
.celebrate-card {
  background: var(--card);
  border-radius: 28px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  padding: 24px;
  text-align: center;
  max-width: 340px;
  width: 100%;
  animation: popin 0.4s ease-out;
}
@keyframes popin {
  0%   { transform: scale(.5); opacity: 0; }
  70%  { transform: scale(1.05); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}
.celebrate-title { font-size: 1.6rem; margin-bottom: 6px; }
.celebrate-name  { font-size: 1.3rem; margin: 12px 0 18px; }
.statue-art.big svg { width: 200px; max-width: 70%; height: auto; margin: 0 auto; display: block; }

@media (max-width: 600px) {
  .collection-grid { gap: 10px; }
  .statue-name { font-size: 1rem; }
}

.menu {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 18px;
}
.menu-card {
  background: var(--card);
  border: none;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 28px 16px;
  font: inherit;
  font-size: 1.4rem;
  color: var(--ink);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  transition: transform .05s;
}
.menu-card .emoji { font-size: 3rem; }
.menu-card:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,0.12); }

/* ---------- Level picker ---------- */
.level-list { display: grid; gap: 14px; }
.level-card {
  background: var(--card);
  border: none;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px 22px;
  font: inherit;
  text-align: left;
  color: var(--ink);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 16px;
}
.level-card:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,0.12); }
.level-num {
  background: var(--purple);
  color: #fff;
  width: 48px; height: 48px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 1.4rem;
  flex-shrink: 0;
}
.level-card .meta { flex: 1; }
.level-card .meta b { font-size: 1.3rem; }
.level-card .meta span { display: block; opacity: .65; font-size: 1rem; }
.level-card .star { font-size: 1.6rem; }

/* ---------- Activity stage (shared) ---------- */
.stage {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 26px;
  text-align: center;
}
.prompt { font-size: 1.2rem; opacity: .7; }

/* The big word/letter card */
.bigcard {
  background: var(--card);
  border-radius: 32px;
  box-shadow: var(--shadow);
  padding: 40px 50px;
  min-width: 260px;
}
.bigword {
  font-size: 5.5rem;
  letter-spacing: 4px;
  display: flex;
  gap: 6px;
  justify-content: center;
  flex-wrap: wrap;
}
.bigword .ltr {
  padding: 4px 10px;
  border-radius: 16px;
  cursor: pointer;
  transition: transform .08s, background .15s;
}
.bigword .ltr.lit { background: var(--yellow); transform: translateY(-8px) scale(1.1); }
/* vowels get a subtle color cue */
.bigword .ltr.vowel { color: var(--pink); }

.keyword-line { font-size: 1.8rem; }
.keyword-line .emoji { font-size: 2.4rem; vertical-align: middle; }

/* Decodable sentence (smaller than a single big word) */
.sentence {
  font-size: 2.4rem;
  line-height: 1.4;
  max-width: 9em;
}

/* Buttons */
.btn-row { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
.btn {
  border: none;
  font: inherit;
  font-size: 1.3rem;
  padding: 16px 26px;
  border-radius: 999px;
  box-shadow: var(--shadow);
  cursor: pointer;
  color: #fff;
}
.btn:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,0.12); }
.btn.blue   { background: var(--primary); }
.btn.green  { background: var(--green-d); }
.btn.pink   { background: var(--pink); }
.btn.yellow { background: var(--yellow); color: var(--ink); }
.btn.ghost  { background: var(--card); color: var(--ink); }

.hear-btn {
  background: var(--card);
  color: var(--ink);
  border: none;
  font: inherit;
  font-size: 1.2rem;
  padding: 14px 22px;
  border-radius: 999px;
  box-shadow: var(--shadow);
  cursor: pointer;
}
.hear-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,0.12); }

/* Progress dots */
.progress {
  font-size: 1.1rem;
  opacity: .7;
}

/* Celebration */
.cheer {
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
  font-size: 6rem;
  pointer-events: none;
  animation: pop .8s ease-out forwards;
}
@keyframes pop {
  0%   { transform: scale(.3); opacity: 0; }
  40%  { transform: scale(1.2); opacity: 1; }
  100% { transform: scale(1);   opacity: 0; }
}

/* Done screen */
.done { text-align: center; }
.done .big { font-size: 4rem; }

@media (max-width: 600px) {
  .bigword { font-size: 4rem; }
  .menu-card { font-size: 1.2rem; }
}

  </style>
</head>
<body>

  <script>
/*
 * Reading Buddy — all the content lives here.
 * Edit this file to tune things to exactly where your reader is.
 *
 * Each LETTER SOUND has:
 *   g       the grapheme she sees (e.g. "a", "sh")
 *   keyword a word that starts with the sound (for the picture/audio cue)
 *   emoji   a friendly picture for the keyword
 *
 * Each LEVEL has:
 *   id, name, focus   what it's about
 *   newSounds         graphemes introduced at this level
 *   words             real CVC/decodable words to read & blend
 *   nonsense          decodable NON-words (classic OG check that she's
 *                     sounding out, not memorizing) — used in "Real or Not?"
 *   sentences         short decodable sentences using sounds taught so far
 */

window.READING_DATA = {

  // ---- Master letter-sound deck (used by the "Sounds" activity) ----
  letterSounds: [
    { g: "s", keyword: "sun",      emoji: "☀️" },
    { g: "a", keyword: "apple",    emoji: "🍎" },

    { g: "i", keyword: "igloo",    emoji: "🏠" },
    { g: "n", keyword: "net",      emoji: "🥅" },
    { g: "m", keyword: "moon",     emoji: "🌙" },
    { g: "d", keyword: "dog",      emoji: "🐶" },
    { g: "o", keyword: "octopus",  emoji: "🐙" },
    { g: "c", keyword: "cat",      emoji: "🐱" },
    { g: "k", keyword: "kite",     emoji: "🪁" },
    { g: "g", keyword: "goat",     emoji: "🐐" },
    { g: "u", keyword: "umbrella", emoji: "☂️" },
    { g: "r", keyword: "rabbit",   emoji: "🐰" },
    { g: "h", keyword: "hat",      emoji: "🎩" },
    { g: "b", keyword: "bus",      emoji: "🚌" },
    { g: "f", keyword: "fish",     emoji: "🐟" },
    { g: "l", keyword: "leaf",     emoji: "🍃" },
    { g: "e", keyword: "egg",      emoji: "🥚" },
    { g: "j", keyword: "jam",      emoji: "🍓" },
    { g: "w", keyword: "web",      emoji: "🕸️" },
    { g: "v", keyword: "van",      emoji: "🚐" },
    { g: "x", keyword: "fox",      emoji: "🦊" },
    { g: "y", keyword: "yo-yo",    emoji: "🪀" },
    { g: "z", keyword: "zip",      emoji: "🤐" },
    { g: "sh", keyword: "ship",    emoji: "🚢" },
    { g: "ch", keyword: "chip",    emoji: "🍟" },
    { g: "th", keyword: "thumb",   emoji: "👍" }
  ],

  // ---- Levels (short-vowel → digraphs → blends; cumulative) ----
  levels: [
    {
      id: 1,
      name: "Short a",
      focus: "Words with the /a/ sound",
      newSounds: ["s", "a", "t", "p", "n", "m", "d"],
      words: ["at", "am", "sat", "pat", "tap", "nap", "map", "mad",
              "dad", "sad", "tan", "pan", "man", "mat", "sap", "pad", "nab", "tam"],
      nonsense: ["nad", "pab", "mab", "sab", "dat", "nan", "tas", "dap"],
      sentences: ["A man sat.", "Pat the cat.", "Dad ran.", "A sad, sad nap.", "Sam sat at a mat."]
    },
    {
      id: 2,
      name: "Short i",
      focus: "Words with the /i/ sound",
      newSounds: ["i"],
      words: ["it", "in", "sit", "sip", "tip", "pit", "pin", "tin",
              "nip", "dip", "dim", "did", "mid", "rim", "rip", "tic"],
      nonsense: ["pim", "tib", "dit", "mip", "sib", "nid", "dap", "nim"],
      sentences: ["Sit in it.", "Dip the tip.", "A pin is in.", "Tim did a flip.", "Pat did sip a bit."]
    },
    {

      focus: "Words with the /o/ sound",
      newSounds: ["o", "c", "g"],
      words: ["on", "cot", "cop", "top", "pop", "pot", "dot", "dog",
              "got", "mop", "mom", "nod", "cod", "tot", "sod", "tog"],
      nonsense: ["pog", "tob", "dod", "nop", "gop", "mog", "cob", "sot"],
      sentences: ["The dog sat.", "Mom got a pot.", "A cat is on top.", "Dad got a big mop.", "The dog can not nod."]
    },
    {
      id: 4,
      name: "Short u",
      focus: "Words with the /u/ sound",
      newSounds: ["u", "b"],
      words: ["up", "us", "cut", "cup", "pup", "sub", "tub", "bud",
              "mud", "mug", "nut", "sun", "bun", "but", "gum", "bug"],
      nonsense: ["dut", "pud", "mub", "gub", "nug", "tup", "bup", "sut"],
      sentences: ["A pup is in mud.", "The sun is up.", "Cut the bun.", "The bug is in a cup.", "Gus had a big mug."]
    },
    {
      id: 5,
      name: "Short e",
      focus: "Words with the /e/ sound",
      newSounds: ["e", "r", "h", "f", "l"],
      words: ["bed", "red", "led", "fed", "pen", "ten", "hen", "men",
              "net", "pet", "get", "leg", "egg", "let", "set", "wet"],
      nonsense: ["bem", "tef", "heb", "nep", "fel", "ped", "lem", "ret"],
      sentences: ["The hen is red.", "Get the pet.", "Ten men ran.", "The red hen sat on a bed.", "Let the wet dog get in."]
    },
    {
      id: 6,
      name: "Digraphs sh, ch, th",
      focus: "Two letters, one sound",
      newSounds: ["sh", "ch", "th"],

              "chin", "rich", "much", "this", "that", "then", "bath", "with", "thin"],
      nonsense: ["chid", "shet", "thip", "chab", "shom", "thut", "shig", "chun"],
      sentences: ["The fish is in the dish.", "Chop with this.", "That ship is big.",
                  "I wish for a chip.", "The thin cat is in the bath."]
    },
    {
      id: 7,
      name: "Starting blends",
      focus: "Two sounds at the start (st, pl, gr…)",
      newSounds: [],
      words: ["stop", "spot", "step", "plan", "plot", "clap", "clip", "flag",
              "flop", "grab", "grin", "trip", "trap", "drum", "drop", "frog", "spin", "slip"],
      nonsense: ["frop", "glet", "plit", "stom", "crad", "snib", "blet", "drix"],
      sentences: ["Stop at the step.", "The frog is on a flag.", "I can spin and grin.",
                  "Grab the drum and clap.", "The plan is to flip and flop."]
    },
    {
      id: 8,
      name: "Ending blends",
      focus: "Two sounds at the end (-nd, -mp, -st, -nk)",
      newSounds: [],
      words: ["hand", "land", "sand", "bend", "jump", "lamp", "camp", "fast",
              "last", "nest", "best", "bank", "sink", "pink", "junk", "wind", "tent", "milk"],
      nonsense: ["pand", "jund", "wint", "lemp", "gonk", "tisk", "fust", "rint"],
      sentences: ["The lamp is on the desk.", "I can jump in the sand.",

    }
  ],

  // ---- Heart / red words (irregular high-frequency words) ----
  // The "heart" marks the tricky part you learn "by heart".

    "the", "a", "is", "to", "was", "of", "said", "you",
    "are", "he", "she", "we", "me", "be", "my", "I",

  <script>
/*
 * Reading Buddy — app logic.
 * Plain vanilla JS. No build step, no dependencies.
 *
 * Structure: a tiny screen router renders into #app. Each activity is a
 * function that builds its own DOM and wires up its own buttons.
 */

(function () {
  "use strict";

  const DATA = window.READING_DATA;
  const app = document.getElementById("app");
  const VOWELS = new Set(["a", "e", "i", "o", "u"]);

  /* ---------------- Audio (browser text-to-speech) ----------------
     TTS reads single letters by NAME ("ay"), not sound ("/a/"), so we only
     ever speak whole WORDS or KEYWORDS, never lone letters. Per-sound practice
     is "say it yourself" (multisensory). Recorded phoneme audio is a later upgrade. */
  function speak(text, rate) {
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = rate || 0.85;   // a touch slow for little ears
      u.pitch = 1.05;
      u.lang = "en-US";
      window.speechSynthesis.speak(u);
    } catch (e) { /* speech not available — fail quietly */ }
  }

  /* ---------------- Progress (on-device only) ---------------- */
  const STORE_KEY = "reading-buddy-progress";
  function loadProgress() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
    catch (e) { return {}; }
  }
  function saveProgress(p) {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(p)); } catch (e) {}
  }
  function markLevelStar(levelId) {
    const p = loadProgress();
    p.stars = p.stars || {};
    p.stars[levelId] = true;
    saveProgress(p);
  }
  // Collectible star jar — grows every time she reads something.
  // Returns a newly-unlocked statue (or null) so we can celebrate it.
  function earnStars(n) {
    const p = loadProgress();
    const before = p.starCount || 0;
    const after = before + n;
    p.starCount = after;
    saveProgress(p);
    const unlocked = STATUES.find(s => before < s.stars && after >= s.stars);
    if (unlocked) celebrateStatue(unlocked);
  }
  function getStarCount() { return loadProgress().starCount || 0; }
  function getLevelsMastered() { return Object.keys(loadProgress().stars || {}).length; }
  function unlockedStatueCount() { const n = getStarCount(); return STATUES.filter(s => n >= s.stars).length; }

  /* ---------------- Small helpers ---------------- */
  function el(tag, props, kids) {
    const n = document.createElement(tag);
    if (props) Object.keys(props).forEach(k => {
      if (k === "class") n.className = props[k];
      else if (k === "html") n.innerHTML = props[k];
      else if (k.startsWith("on")) n.addEventListener(k.slice(2), props[k]);
      else n.setAttribute(k, props[k]);
    });
    (kids || []).forEach(c => n.appendChild(typeof c === "string" ? document.createTextNode(c) : c));
    return n;
  }
  function clear() { app.innerHTML = ""; }
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function cheer(emoji) {
    const c = el("div", { class: "cheer" }, [emoji || "🎉"]);
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 800);
  }
  function topbar(title, onBack) {
    return el("div", { class: "topbar" }, [
      onBack
        ? el("button", { class: "back-btn", onclick: onBack }, ["← Back"])
        : el("div", { class: "spacer" }),
      el("h1", null, [title]),
      el("div", { class: "spacer" })
    ]);
  }

  /* ---------------- Collectible statues ---------------- */
  // Shared pieces so all three statues sit on the same pedestal + open book.
  const PEDESTAL =
    '<ellipse cx="100" cy="233" rx="74" ry="7" fill="#00000015"/>' +
    '<rect x="40" y="208" width="120" height="26" rx="6" fill="#e3c682"/>' +
    '<rect x="40" y="208" width="120" height="7" rx="4" fill="#f1dca0"/>' +
    '<rect x="54" y="192" width="92" height="18" rx="5" fill="#eed79a"/>';

  const BOOK =
    '<path d="M100 152 C 80 143, 56 145, 45 152 L 45 196 C 56 189, 80 187, 100 196 Z" fill="#ffffff" stroke="#d9c08a" stroke-width="2"/>' +
    '<path d="M100 152 C 120 143, 144 145, 155 152 L 155 196 C 144 189, 120 187, 100 196 Z" fill="#fbf4e2" stroke="#d9c08a" stroke-width="2"/>' +
    '<line x1="100" y1="152" x2="100" y2="196" stroke="#d9c08a" stroke-width="2"/>' +
    '<g stroke="#cdd8f2" stroke-width="3" stroke-linecap="round">' +
    '<line x1="58" y1="162" x2="90" y2="160"/><line x1="58" y1="172" x2="90" y2="170"/><line x1="60" y1="182" x2="86" y2="181"/>' +

    '<path d="M82 98 q 6 7 12 0" stroke="#6a4a3a" stroke-width="3" fill="none" stroke-linecap="round"/>' +

    '<circle cx="80" cy="112" r="5" fill="#ffc0b0"/><circle cx="120" cy="112" r="5" fill="#ffc0b0"/>' +
    '<path d="M92 116 q 8 8 16 0" stroke="#c97a6a" stroke-width="2.5" fill="none" stroke-linecap="round"/>';

  function statueSVG(characterSvg) {
    return '<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">' +
      PEDESTAL + characterSvg + BOOK + '</svg>';
  }

  const STATUES = [
    { id: "cat",     name: "Reading Cat",     stars: 10, svg: statueSVG(CAT_CHAR) },
    { id: "unicorn", name: "Reading Unicorn", stars: 25, svg: statueSVG(UNICORN_CHAR) },
    { id: "mermaid", name: "Reading Mermaid", stars: 50, svg: statueSVG(MERMAID_CHAR) }
  ];

  // Big reveal overlay when a new statue is unlocked.
  function celebrateStatue(s) {
    const art = el("div", { class: "statue-art big" });
    art.innerHTML = s.svg;
    const overlay = el("div", { class: "celebrate-overlay" }, [
      el("div", { class: "celebrate-card" }, [
        el("div", { class: "celebrate-title" }, ["🎉 New Statue! 🎉"]),
        art,
        el("div", { class: "celebrate-name" }, ["You unlocked the " + s.name + "!"]),
        el("button", { class: "btn blue", onclick: function () { overlay.remove(); } }, ["Awesome! ✨"])
      ])
    ]);
    document.body.appendChild(overlay);
    cheer("🌟");
  }

  /* ---------------- COLLECTION ---------------- */
  function renderCollection() {
    clear();
    app.appendChild(topbar("My Collection 🏛️", renderHome));
    const n = getStarCount();
    const intro = el("div", { class: "prompt", style: "margin-bottom:8px" }, [
      "Collect a statue for every " + "milestone of stars!"
    ]);
    app.appendChild(intro);

    const grid = el("div", { class: "collection-grid" });
    STATUES.forEach(s => {
      const unlocked = n >= s.stars;
      const art = el("div", { class: "statue-art" });
      art.innerHTML = s.svg;
      const card = el("div", { class: "statue-card" + (unlocked ? "" : " locked") }, [
        art,
        el("div", { class: "statue-name" }, [unlocked ? s.name : "???"]),
        el("div", { class: "statue-req" }, [
          unlocked ? "✅ Unlocked!" : ("🔒 " + n + " / " + s.stars + " ⭐")
        ])
      ]);
      if (!unlocked) card.appendChild(el("div", { class: "lock-badge" }, ["🔒"]));
      grid.appendChild(card);
    });
    app.appendChild(grid);
  }

  /* ---------------- Star jar (home accomplishments) ---------------- */
  function starsBanner() {
    const n = getStarCount();
    const mastered = getLevelsMastered();
    const total = DATA.levels.length;
    const MAX_SHOWN = 60; // keep the row from overflowing on big collections

    const head = el("div", { class: "stars-head" }, [
      el("span", { class: "stars-count" }, ["⭐ " + n]),
      el("span", { class: "stars-label" }, [n === 1 ? "star collected!" : "stars collected!"])
    ]);
    const banner = el("div", { class: "stars-banner" }, [head]);

    if (n > 0) {
      const row = el("div", { class: "stars-row" });
      const shown = Math.min(n, MAX_SHOWN);
      for (let k = 0; k < shown; k++) row.appendChild(document.createTextNode("⭐"));
      if (n > MAX_SHOWN) row.appendChild(el("span", { class: "stars-more" }, [" +" + (n - MAX_SHOWN)]));
      banner.appendChild(row);
    } else {
      banner.appendChild(el("div", { class: "stars-empty" }, ["Read and play to collect stars! 🌟"]));
    }

    banner.appendChild(el("div", { class: "stars-sub" }, [
      "🏅 Levels mastered: " + mastered + " of " + total
    ]));
    return banner;
  }

  /* ---------------- HOME ---------------- */
  function renderHome() {
    clear();
    app.appendChild(el("h1", { class: "home-title" }, ["Reading Buddy 📖"]));
    app.appendChild(el("p", { class: "home-sub" }, ["Pick something fun to do!"]));
    app.appendChild(starsBanner());
    app.appendChild(el("button", { class: "collection-btn", onclick: renderCollection }, [
      "🏛️ My Collection  (" + unlockedStatueCount() + " / " + STATUES.length + ")"
    ]));

    const items = [
      { emoji: "🔤", label: "Sounds",      go: renderSounds },
      { emoji: "🧩", label: "Blend Words", go: () => renderLevelPicker("blend") },
      { emoji: "📕", label: "Read Words",  go: () => renderLevelPicker("read") },
      { emoji: "📖", label: "Sentences",   go: () => renderLevelPicker("sentences") },
      { emoji: "🕵️", label: "Real or Not?", go: renderRealOrNot },
      { emoji: "❤️", label: "Heart Words", go: renderHeartWords }
    ];
    const menu = el("div", { class: "menu" });
    items.forEach(it => {
      menu.appendChild(el("button", { class: "menu-card", onclick: it.go }, [
        el("span", { class: "emoji" }, [it.emoji]),
        el("span", null, [it.label])
      ]));
    });
    app.appendChild(menu);
  }

  /* ---------------- LEVEL PICKER ---------------- */
  function renderLevelPicker(mode) {
    clear();
    app.appendChild(topbar("Pick a Level", renderHome));
    const stars = (loadProgress().stars) || {};
    const list = el("div", { class: "level-list" });
    DATA.levels.forEach(lvl => {
      list.appendChild(el("button", {
        class: "level-card",
        onclick: () => {
          if (mode === "blend") renderBlend(lvl);
          else if (mode === "sentences") renderSentences(lvl);
          else renderRead(lvl);
        }
      }, [
        el("span", { class: "level-num" }, [String(lvl.id)]),
        el("span", { class: "meta" }, [
          el("b", null, [lvl.name]),
          el("span", null, [lvl.focus])
        ]),
        el("span", { class: "star" }, [stars[lvl.id] ? "⭐" : "☆"])
      ]));
    });
    app.appendChild(list);
  }

  /* helper: render a word as tappable letters (groups digraphs visually) */
  function wordLetters(word, onTap) {
    const box = el("div", { class: "bigword" });
    // split into grapheme chunks: keep sh/ch/th together
    const chunks = [];
    for (let i = 0; i < word.length; i++) {
      const two = word.slice(i, i + 2);
      if (two === "sh" || two === "ch" || two === "th") { chunks.push(two); i++; }
      else chunks.push(word[i]);
    }
    chunks.forEach(ch => {
      const isVowel = ch.length === 1 && VOWELS.has(ch);
      const span = el("span", {
        class: "ltr" + (isVowel ? " vowel" : ""),
        onclick: function () {
          this.classList.add("lit");
          setTimeout(() => this.classList.remove("lit"), 350);
          if (onTap) onTap(ch);
        }
      }, [ch]);
      box.appendChild(span);
    });
    return box;
  }

  /* ---------------- ACTIVITY: SOUNDS ---------------- */
  function renderSounds() {
    const deck = shuffle(DATA.letterSounds);
    let i = 0;

    function show() {
      clear();
      app.appendChild(topbar("Sounds 🔤", renderHome));
      const card = deck[i];
      const stage = el("div", { class: "stage" });

      stage.appendChild(el("div", { class: "prompt" }, ["What sound does this make? Say it out loud!"]));
      stage.appendChild(el("div", { class: "bigcard" }, [
        el("div", { class: "bigword" }, [
          el("span", { class: "ltr" + (card.g.length === 1 && VOWELS.has(card.g) ? " vowel" : "") }, [card.g])
        ])
      ]));

      const reveal = el("div", { class: "keyword-line", style: "visibility:hidden" }, [
        el("span", { class: "emoji" }, [card.emoji]),
        " " + card.g + "  …like  " + card.keyword
      ]);
      stage.appendChild(reveal);

      stage.appendChild(el("div", { class: "btn-row" }, [
        el("button", { class: "hear-btn", onclick: () => {
          reveal.style.visibility = "visible";
          speak(card.keyword);            // keyword cue (TTS can't do lone phonemes well)
        } }, ["👂 Check"]),
        el("button", { class: "btn green", onclick: next }, ["Next →"])
      ]));

      stage.appendChild(el("div", { class: "progress" }, [(i + 1) + " / " + deck.length]));
      app.appendChild(stage);
    }
    function next() {
      earnStars(1);
      i++;
      if (i >= deck.length) { cheer("🌟"); renderDone("Sounds", "🔤", renderSounds); }
      else show();
    }
    show();
  }

  /* ---------------- ACTIVITY: BLEND WORDS ---------------- */
  function renderBlend(lvl) {
    const words = shuffle(lvl.words);
    let i = 0;

    function show() {
      clear();
      app.appendChild(topbar("Blend: " + lvl.name + " 🧩", () => renderLevelPicker("blend")));
      const word = words[i];
      const stage = el("div", { class: "stage" });

      stage.appendChild(el("div", { class: "prompt" }, ["Tap each letter and say its sound… then blend it together!"]));
      stage.appendChild(el("div", { class: "bigcard" }, [ wordLetters(word) ]));

      stage.appendChild(el("div", { class: "btn-row" }, [
        el("button", { class: "hear-btn", onclick: () => speak(word, 0.6) }, ["👂 Hear it slow"]),
        el("button", { class: "hear-btn", onclick: () => speak(word, 0.95) }, ["🔊 Hear it"])
      ]));

      stage.appendChild(el("div", { class: "btn-row" }, [
        el("button", { class: "btn green", onclick: next }, ["I read it! ✅"])
      ]));

      stage.appendChild(el("div", { class: "progress" }, [(i + 1) + " / " + words.length]));
      app.appendChild(stage);
    }
    function next() {
      earnStars(1);
      cheer("🎉");
      i++;
      if (i >= words.length) { markLevelStar(lvl.id); renderDone("Blend Words", "🧩", () => renderBlend(lvl)); }
      else show();
    }
    show();
  }

  /* ---------------- ACTIVITY: READ WORDS ---------------- */
  function renderRead(lvl) {
    const words = shuffle(lvl.words);
    let i = 0, got = 0;

    function show() {
      clear();
      app.appendChild(topbar("Read: " + lvl.name + " 📕", () => renderLevelPicker("read")));
      const word = words[i];
      const stage = el("div", { class: "stage" });

      stage.appendChild(el("div", { class: "prompt" }, ["Read this word out loud."]));
      stage.appendChild(el("div", { class: "bigcard" }, [ wordLetters(word) ]));

      stage.appendChild(el("button", { class: "hear-btn", onclick: () => speak(word) }, ["👂 Check it"]));

      stage.appendChild(el("div", { class: "btn-row" }, [
        el("button", { class: "btn green", onclick: () => next(true) }, ["Got it! 😄"]),
        el("button", { class: "btn yellow", onclick: () => next(false) }, ["Tricky 🤔"])
      ]));

      stage.appendChild(el("div", { class: "progress" }, [(i + 1) + " / " + words.length]));
      app.appendChild(stage);
    }
    function next(success) {
      if (success) { got++; earnStars(1); cheer("⭐"); }
      i++;
      if (i >= words.length) {
        if (got >= Math.ceil(words.length * 0.7)) markLevelStar(lvl.id);
        renderDone("Read Words", "📕", () => renderRead(lvl), "You got " + got + " of " + words.length + "!");
      } else show();
    }
    show();
  }

  /* ---------------- ACTIVITY: SENTENCES ---------------- */
  function renderSentences(lvl) {
    const sentences = shuffle(lvl.sentences);
    let i = 0;

    function show() {
      clear();
      app.appendChild(topbar("Read: " + lvl.name + " 📖", () => renderLevelPicker("sentences")));
      const sentence = sentences[i];
      const stage = el("div", { class: "stage" });

      stage.appendChild(el("div", { class: "prompt" }, ["Read the whole sentence out loud."]));
      stage.appendChild(el("div", { class: "bigcard" }, [
        el("div", { class: "sentence" }, [sentence])
      ]));

      stage.appendChild(el("button", { class: "hear-btn", onclick: () => speak(sentence) }, ["👂 Check it"]));
      stage.appendChild(el("div", { class: "btn-row" }, [
        el("button", { class: "btn green", onclick: next }, ["I read it! ✅"])
      ]));
      stage.appendChild(el("div", { class: "progress" }, [(i + 1) + " / " + sentences.length]));
      app.appendChild(stage);
    }
    function next() {
      earnStars(1);
      cheer("🎉");
      i++;
      if (i >= sentences.length) { markLevelStar(lvl.id); renderDone("Sentences", "📖", () => renderSentences(lvl)); }
      else show();
    }
    show();
  }

  /* ---------------- ACTIVITY: REAL OR NOT? ---------------- */
  function renderRealOrNot() {
    // Build a mixed deck of real words and decodable non-words from all levels.
    const pool = [];
    DATA.levels.forEach(lvl => {
      lvl.words.forEach(w => pool.push({ word: w, real: true }));
      (lvl.nonsense || []).forEach(w => pool.push({ word: w, real: false }));
    });
    const deck = shuffle(pool).slice(0, 12);
    let i = 0, got = 0;

    function show() {
      clear();
      app.appendChild(topbar("Real or Not? 🕵️", renderHome));
      const card = deck[i];
      const stage = el("div", { class: "stage" });

      stage.appendChild(el("div", { class: "prompt" }, ["Sound it out. Is it a REAL word?"]));
      stage.appendChild(el("div", { class: "bigcard" }, [ wordLetters(card.word) ]));

      stage.appendChild(el("div", { class: "btn-row" }, [
        el("button", { class: "btn green", onclick: () => answer(true) }, ["✅ Real word"]),
        el("button", { class: "btn pink", onclick: () => answer(false) }, ["❌ Not a word"])
      ]));
      stage.appendChild(el("div", { class: "progress" }, [(i + 1) + " / " + deck.length]));
      app.appendChild(stage);
    }
    function answer(saidReal) {
      const card = deck[i];
      if (saidReal === card.real) { got++; earnStars(1); cheer("⭐"); }
      else { cheer("🤔"); speak(card.real ? (card.word + " is a real word") : (card.word + " is not a real word")); }
      i++;
      if (i >= deck.length) {
        renderDone("Real or Not?", "🕵️", renderRealOrNot, "You got " + got + " of " + deck.length + "!");
      } else show();
    }
    show();
  }

  /* ---------------- ACTIVITY: HEART WORDS ---------------- */
  function renderHeartWords() {
    const words = shuffle(DATA.heartWords);
    let i = 0;

    function show() {
      clear();
      app.appendChild(topbar("Heart Words ❤️", renderHome));
      const word = words[i];
      const stage = el("div", { class: "stage" });

      stage.appendChild(el("div", { class: "prompt" }, ["Some words you just know by heart. Read it!"]));
      stage.appendChild(el("div", { class: "bigcard" }, [
        el("div", { class: "bigword" }, [ el("span", { class: "ltr" }, [word]) ])
      ]));

      stage.appendChild(el("button", { class: "hear-btn", onclick: () => speak(word) }, ["👂 Check it"]));
      stage.appendChild(el("div", { class: "btn-row" }, [
        el("button", { class: "btn pink", onclick: next }, ["Next ❤️"])
      ]));
      stage.appendChild(el("div", { class: "progress" }, [(i + 1) + " / " + words.length]));
      app.appendChild(stage);
    }
    function next() {
      earnStars(1);
      i++;
      if (i >= words.length) { cheer("💖"); renderDone("Heart Words", "❤️", renderHeartWords); }
      else show();
    }
    show();
  }

  /* ---------------- DONE SCREEN ---------------- */
  function renderDone(title, emoji, again, subtitle) {
    clear();
    app.appendChild(topbar(title, renderHome));
    const stage = el("div", { class: "stage" });
    stage.appendChild(el("div", { class: "done" }, [
      el("div", { class: "big" }, [emoji + " 🌟"]),
      el("h2", null, ["Great job!"]),
      subtitle ? el("p", { class: "prompt" }, [subtitle]) : el("span")
    ]));
    stage.appendChild(el("div", { class: "btn-row" }, [
      el("button", { class: "btn blue", onclick: again }, ["Again 🔁"]),
      el("button", { class: "btn ghost", onclick: renderHome }, ["🏠 Home"])
    ]));
    app.appendChild(stage);
  }

  /* ---------------- start ---------------- */
  renderHome();
})();

  </script>
